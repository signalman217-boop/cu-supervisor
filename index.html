<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>CU 슈퍼바이저</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --green: #00753A;
  --green-light: #00A050;
  --green-pale: #E8F5EE;
  --green-pale2: #D0EBDB;
  --red: #E53935;
  --red-pale: #FFEBEE;
  --orange: #F57C00;
  --bg: #F5F7F5;
  --white: #FFFFFF;
  --surface: #FFFFFF;
  --border: #E0E8E3;
  --border2: #C8DDD2;
  --text: #1A2E22;
  --text2: #4A6355;
  --text3: #7A9B87;
  --shadow: 0 1px 4px rgba(0,80,40,0.08), 0 4px 16px rgba(0,80,40,0.06);
  --shadow-sm: 0 1px 3px rgba(0,80,40,0.08);
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
}

/* ── LAYOUT ── */
.app { display:flex; flex-direction:column; height:100vh; }

.topbar {
  background: var(--green);
  color: #fff;
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,80,40,0.2);
}
.topbar-logo { display:flex; align-items:center; gap:10px; }
.topbar-badge {
  background: #fff;
  color: var(--green);
  font-weight: 900;
  font-size: 0.85rem;
  padding: 3px 10px;
  border-radius: 6px;
  letter-spacing: 1px;
}
.topbar-title { font-weight: 700; font-size: 0.95rem; }
.topbar-actions { display:flex; gap:8px; }
.topbar-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 0.75rem;
  font-weight: 600;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  white-space: nowrap;
  touch-action: manipulation;
}
.topbar-btn:active { background: rgba(255,255,255,0.25); }
.topbar-btn.active { background: #fff; color: var(--green); }

/* ── NAV TABS ── */
.nav-tabs {
  display: flex;
  background: var(--white);
  border-bottom: 2px solid var(--border);
  flex-shrink: 0;
}
.nav-tab {
  flex: 1;
  padding: 10px 4px;
  text-align: center;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
  touch-action: manipulation;
  font-family: 'Noto Sans KR', sans-serif;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.nav-tab.active { color: var(--green); border-bottom-color: var(--green); }

/* ── MAIN BODY ── */
.main-body { display:flex; flex:1; overflow:hidden; }

/* ── PANEL ── */
.panel { display:none; flex:1; overflow:hidden; flex-direction:column; }
.panel.active { display:flex; }

/* ── SCROLL CONTAINER ── */
.scroll { overflow-y:auto; -webkit-overflow-scrolling:touch; flex:1; padding:14px; }
.scroll::-webkit-scrollbar { width:4px; }
.scroll::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ── CARDS ── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  margin-bottom: 10px;
  overflow: hidden;
}
.card-header {
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: var(--green-pale);
}
.card-title { font-size: 0.82rem; font-weight: 700; color: var(--green); }
.card-body { padding: 12px 14px; }

/* ── SECTION LABEL ── */
.sec-label {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 5px;
}

/* ── FORM ── */
.form-input {
  width: 100%;
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 9px 11px;
  font-size: 0.82rem;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--text);
  background: var(--white);
  outline: none;
  -webkit-appearance: none;
  margin-bottom: 8px;
}
.form-input:focus { border-color: var(--green); }

/* ── BUTTONS ── */
.btn {
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
  transition: opacity 0.15s;
}
.btn:active { opacity: 0.8; }
.btn-primary { background: var(--green); color: #fff; padding: 10px; font-size: 0.8rem; width: 100%; min-height: 40px; }
.btn-sm { padding: 6px 12px; font-size: 0.72rem; }
.btn-green-outline { background: var(--green-pale); color: var(--green); border: 1.5px solid var(--green-pale2); }
.btn-red-outline { background: var(--red-pale); color: var(--red); border: 1.5px solid #FFCDD2; }
.btn-gray { background: #F0F0F0; color: var(--text2); }

/* ── DAY BUTTONS ── */
.day-row { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:8px; }
.day-btn {
  padding: 6px 9px;
  border-radius: 6px;
  font-size: 0.72rem;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  border: 1.5px solid var(--border2);
  background: var(--white);
  color: var(--text2);
  cursor: pointer;
  touch-action: manipulation;
  min-height: 32px;
  -webkit-appearance: none;
}
.day-btn.active { background: var(--green); border-color: var(--green); color: #fff; }
.day-btn.leave { background: var(--red-pale); border-color: #FFCDD2; color: var(--red); }

/* ── STORE LIST ── */
.store-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: border-color 0.2s;
}
.store-card.selected { border-color: var(--green); box-shadow: 0 0 0 2px var(--green-pale2); }
.store-card.completed { border-color: var(--green-light); background: var(--green-pale); }
.store-card.leave-day { border-color: var(--red) !important; border-width: 2px !important; }

.store-card-header {
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 44px;
  cursor: pointer;
  touch-action: manipulation;
}
.store-name { font-size: 0.82rem; font-weight: 700; flex:1; }
.store-day-tags { display:flex; gap:3px; flex-wrap:wrap; }
.store-day-tag {
  font-size: 0.6rem;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 4px;
  background: var(--green-pale2);
  color: var(--green);
}
.store-order-badge {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--green);
  color: #fff;
  font-size: 0.7rem;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.store-complete-icon { color: var(--green); font-size: 1rem; flex-shrink:0; }

.store-progress { height: 3px; background: var(--border); }
.store-progress-fill { height:100%; background: var(--green-light); transition: width 0.3s; }

/* 체크리스트 - 항상 표시 */
.store-checklist {
  padding: 8px 12px 10px;
  border-top: 1px solid var(--border);
}
.checklist-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid #F0F0F0;
  min-height: 36px;
}
.checklist-item:last-child { border-bottom: none; }
.check-btn {
  width: 22px; height: 22px;
  border: 2px solid var(--border2);
  border-radius: 5px;
  background: var(--white);
  color: var(--white);
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
  font-family: 'Noto Sans KR', sans-serif;
}
.check-btn.done { background: var(--green); border-color: var(--green); }
.check-text { font-size: 0.76rem; flex:1; color: var(--text2); }
.check-text.done { text-decoration: line-through; color: var(--text3); }
.del-btn {
  background: none; border: none;
  color: #CCC; font-size: 0.8rem;
  padding: 4px 6px; cursor: pointer;
  touch-action: manipulation;
  min-width: 28px; min-height: 28px;
  font-family: 'Noto Sans KR', sans-serif;
}
.add-task-row { display:flex; gap:6px; margin-top:8px; }
.task-input {
  flex:1;
  border: 1.5px solid var(--border2);
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 0.78rem;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--text);
  background: var(--bg);
  outline: none;
  -webkit-appearance: none;
}
.task-input:focus { border-color: var(--green); background: var(--white); }
.task-add-btn {
  background: var(--green);
  border: none;
  border-radius: 6px;
  color: #fff;
  padding: 7px 12px;
  font-size: 0.75rem;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  touch-action: manipulation;
  white-space: nowrap;
  -webkit-appearance: none;
  min-height: 36px;
}
.no-task { font-size:0.72rem; color:var(--text3); padding:4px 0; }

/* ── MAP PANEL ── */
.map-container {
  flex:1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}
.map-toolbar {
  padding: 8px 12px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.map-hint {
  font-size: 0.68rem;
  color: var(--text3);
  flex:1;
}
.map-canvas-wrap {
  flex:1;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
#map-canvas {
  background: var(--white);
  border: 2px solid var(--border2);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  cursor: crosshair;
  touch-action: none;
  display: block;
}
.map-pin {
  position: absolute;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.map-pin-inner {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--green);
  border: 2.5px solid #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 7px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  line-height: 1.1;
  cursor: pointer;
  pointer-events: all;
  touch-action: manipulation;
  transition: transform 0.15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.map-pin-inner.completed { background: #00A050; }
.map-pin-inner.selected { transform: scale(1.2); box-shadow: 0 0 0 3px var(--green-pale2), 0 2px 8px rgba(0,0,0,0.2); }
.map-pin-order {
  position: absolute;
  top: -4px; right: -4px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--orange);
  color: #fff;
  font-size: 7px;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  font-family: 'Noto Sans KR', sans-serif;
}
.map-route-svg {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* ── LEAVE PANEL ── */
.week-grid { display:flex; gap:6px; margin-bottom:12px; }
.week-day-cell {
  flex:1;
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  padding: 8px 4px;
  text-align: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text2);
  cursor: pointer;
  touch-action: manipulation;
  background: var(--white);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  -webkit-appearance: none;
  transition: all 0.15s;
}
.week-day-cell.has-leave { border-color: var(--red); background: var(--red-pale); color: var(--red); }
.week-day-cell .leave-badge { font-size: 0.55rem; font-weight: 700; }

.leave-types { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.leave-type-btn {
  flex:1;
  min-width: 60px;
  padding: 8px 6px;
  border-radius: 8px;
  font-size: 0.72rem;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  border: 1.5px solid var(--border2);
  background: var(--white);
  color: var(--text2);
  cursor: pointer;
  touch-action: manipulation;
  text-align: center;
  -webkit-appearance: none;
  min-height: 40px;
}
.leave-type-btn.selected { background: var(--red-pale); border-color: var(--red); color: var(--red); }

/* ── SUMMARY PANEL ── */
.summary-day-block {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.summary-day-header {
  padding: 10px 14px;
  background: var(--green-pale);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.summary-day-name { font-weight: 700; font-size: 0.85rem; color: var(--green); }
.summary-leave-badge {
  font-size: 0.68rem;
  font-weight: 700;
  background: var(--red-pale);
  color: var(--red);
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid #FFCDD2;
}
.summary-store-row {
  padding: 8px 14px;
  border-bottom: 1px solid #F5F5F5;
}
.summary-store-row:last-child { border-bottom: none; }
.summary-store-name { font-size: 0.78rem; font-weight: 700; color: var(--text); margin-bottom: 4px; display:flex; align-items:center; gap:6px; }
.summary-task { font-size: 0.72rem; color: var(--text3); padding: 2px 0 2px 8px; display:flex; align-items:center; gap:4px; }
.summary-task.done { color: var(--green); }
.summary-empty { font-size:0.75rem; color:var(--text3); padding:12px 14px; }

/* ── RIGHT DETAIL (데스크탑) ── */
.detail-panel {
  width: 260px;
  background: var(--white);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.detail-header {
  padding: 12px 14px;
  background: var(--green-pale);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.detail-title { font-size: 0.8rem; font-weight: 700; color: var(--green); }
.detail-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:12px; }
.detail-body::-webkit-scrollbar { width:3px; }
.detail-body::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}
.modal-overlay.show { display:flex; }
.modal-box {
  background: var(--white);
  border-radius: 16px 16px 0 0;
  padding: 20px 18px 32px;
  width: 100%;
  max-width: 480px;
}
.modal-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; color: var(--text); }
.modal-btns { display:flex; gap:8px; margin-top:14px; }
.modal-btn {
  flex:1; padding:10px;
  border-radius: 8px; border: none;
  font-size: 0.8rem; font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 42px;
  -webkit-appearance: none;
  cursor: pointer;
  touch-action: manipulation;
}
.modal-btn-cancel { background: #F0F0F0; color: var(--text2); }
.modal-btn-confirm { background: var(--red); color: white; }
.modal-btn-green { background: var(--green); color: white; }

/* ── DIVIDER ── */
.divider { height:1px; background:var(--border); margin:10px 0; }

/* ── MOBILE / DESKTOP ── */
@media (max-width: 768px) {
  .detail-panel { display:none; }
  .map-canvas-wrap { padding: 10px; }
}
@media (min-width: 769px) {
  .nav-tabs { display:none; }
  .main-body { flex-direction: row; }
  /* 데스크탑: 모든 패널 동시 표시 */
  .panel { display:flex !important; }
  .panel-stores { width: 300px; border-right: 1px solid var(--border); }
  .panel-map { flex:1; }
  .panel-leave, .panel-summary { display:none !important; }
  .panel-leave.desktop-show, .panel-summary.desktop-show { display:flex !important; }
}

/* ── EMPTY STATE ── */
.empty-state { text-align:center; padding:30px 10px; color:var(--text3); font-size:0.8rem; line-height:2; }
.empty-icon { font-size:2rem; margin-bottom:6px; }

/* 스크롤바 전체 숨김 (모바일) */
@media (max-width: 768px) {
  ::-webkit-scrollbar { display:none; }
}
</style>
</head>
<body>
<!-- 모달: 확인 -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal-box">
    <div class="modal-title" id="modal-confirm-title">확인</div>
    <div id="modal-confirm-desc" style="font-size:0.8rem;color:var(--text2);margin-bottom:4px"></div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" id="modal-confirm-cancel">취소</button>
      <button class="modal-btn modal-btn-confirm" id="modal-confirm-ok">확인</button>
    </div>
  </div>
</div>

<!-- 모달: 점포 추가/편집 -->
<div class="modal-overlay" id="modal-store">
  <div class="modal-box">
    <div class="modal-title" id="modal-store-title">점포 추가</div>
    <div class="sec-label">점포 이름</div>
    <input type="text" class="form-input" id="modal-store-name" placeholder="예: CU역삼점" autocomplete="off"/>
    <div class="sec-label">방문 요일</div>
    <div class="day-row" id="modal-store-days">
      <button class="day-btn" data-day="1">월</button>
      <button class="day-btn" data-day="2">화</button>
      <button class="day-btn" data-day="3">수</button>
      <button class="day-btn" data-day="4">목</button>
      <button class="day-btn" data-day="5">금</button>
      <button class="day-btn" data-day="6">토</button>
      <button class="day-btn" data-day="7">일</button>
    </div>
    <div class="sec-label">방문 순서 (숫자 입력, 비우면 순서 없음)</div>
    <input type="number" class="form-input" id="modal-store-order" placeholder="예: 1" min="1" style="margin-bottom:4px"/>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" id="modal-store-cancel">취소</button>
      <button class="modal-btn modal-btn-green" id="modal-store-ok">저장</button>
    </div>
  </div>
</div>

<!-- 모달: 연차 등록 -->
<div class="modal-overlay" id="modal-leave">
  <div class="modal-box">
    <div class="modal-title" id="modal-leave-title">연차 등록</div>
    <div class="sec-label">종류 선택</div>
    <div class="leave-types" id="modal-leave-types">
      <button class="leave-type-btn" data-leave="연차">연차</button>
      <button class="leave-type-btn" data-leave="반차">반차</button>
      <button class="leave-type-btn" data-leave="반반차">반반차</button>
      <button class="leave-type-btn" data-leave="custom">기타</button>
    </div>
    <div id="modal-leave-custom-wrap" style="display:none">
      <div class="sec-label">직접 입력</div>
      <input type="text" class="form-input" id="modal-leave-custom" placeholder="예: 외출, 교육 등" autocomplete="off"/>
    </div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" id="modal-leave-cancel">취소</button>
      <button class="modal-btn modal-btn-confirm" id="modal-leave-ok" style="background:var(--red)">등록</button>

<script>
// ══════════════════════════════
// 상수
// ══════════════════════════════
const DAY_NAMES = ['','월','화','수','목','금','토','일'];
const DAY_COLORS = ['#00753A','#1565C0','#6A1B9A','#00838F','#E65100','#AD1457','#2E7D32'];
const LEAVE_TYPES = ['연차','반차','반반차','기타'];

// ══════════════════════════════
// 상태
// ══════════════════════════════
let stores = [];
let leaves = {}; // { dayNum: leaveType }
let selectedStoreId = null;
let filterDay = 0;
let nextId = 1;
let mapPlacingMode = false; // 위치 지정 모드
let canvasSize = 400;

// ══════════════════════════════
// 저장/불러오기
// ══════════════════════════════
function save() {
  try {
    localStorage.setItem('cu_v3_stores', JSON.stringify(stores));
    localStorage.setItem('cu_v3_leaves', JSON.stringify(leaves));
  } catch(e) {}
}
function load() {
  try {
    const s = localStorage.getItem('cu_v3_stores');
    const l = localStorage.getItem('cu_v3_leaves');
    if (s) {
      stores = JSON.parse(s);
      nextId = stores.length ? Math.max(...stores.map(x=>x.id)) + 1 : 1;
    } else {
      // 기본 샘플 점포 17개
      const defaults = [
        'CU강남삼성점','CU선정릉점','CU역삼경복점','CU역삼삼부자점','CU선릉제일점',
        'CU역삼점','CU대치금강점','CU역삼드림점','CU도곡럭키점','CU일원마루공원점',
        'CU수서한아름점','CU자곡현대점','CU강남자곡점','CU강남남명학사점',
        'CU자곡힐스테이트점','CU세곡지웰점','CU율현중앙점'
      ];
      stores = defaults.map((name, i) => ({
        id: i+1, name, days:[], tasks:[], order: null,
        px: null, py: null
      }));
      nextId = defaults.length + 1;
    }
    if (l) leaves = JSON.parse(l);
  } catch(e) { stores = []; }
}

// ══════════════════════════════
// 유틸
// ══════════════════════════════
function isComplete(store) {
  return store.tasks && store.tasks.length > 0 && store.tasks.every(t=>t.done);
}
function getProgress(store) {
  if (!store.tasks || store.tasks.length===0) return 0;
  return Math.round(store.tasks.filter(t=>t.done).length / store.tasks.length * 100);
}
function onTap(el, fn) {
  if (!el) return;
  let moved = false;
  el.addEventListener('touchstart', ()=>{ moved=false; }, {passive:true});
  el.addEventListener('touchmove', ()=>{ moved=true; }, {passive:true});
  el.addEventListener('touchend', e=>{ if(!moved){e.preventDefault(); fn(e);} });
  el.addEventListener('click', fn);
}
function showConfirm(title, desc, onOk, okLabel='확인', okClass='modal-btn-confirm') {
  const overlay = document.getElementById('modal-confirm');
  document.getElementById('modal-confirm-title').textContent = title;
  document.getElementById('modal-confirm-desc').textContent = desc;
  const okBtn = document.getElementById('modal-confirm-ok');
  okBtn.textContent = okLabel;
  okBtn.className = `modal-btn ${okClass}`;
  overlay.classList.add('show');
  const cancel = document.getElementById('modal-confirm-cancel');
  function cleanup() {
    overlay.classList.remove('show');
    cancel.removeEventListener('click', onCancel);
    okBtn.removeEventListener('click', onConfirm);
  }
  function onCancel() { cleanup(); }
  function onConfirm() { cleanup(); onOk(); }
  cancel.addEventListener('click', onCancel);
  okBtn.addEventListener('click', onConfirm);
}
function hasLeaveOnDay(day) { return !!leaves[day]; }
function getLeaveDays(store) {
  // store.days 중 연차인 날
  return (store.days || []).filter(d => hasLeaveOnDay(d));
}

// ══════════════════════════════
// 렌더링
// ══════════════════════════════
function renderAll() {
  renderStoreList();
  renderMap();
  renderLeave();
  renderSummary();
  renderDetailPanel();
}

// ─ 점포 목록 ─
function renderStoreList() {
  const list = document.getElementById('store-list');
  const filtered = filterDay === 0 ? stores : stores.filter(s => s.days.includes(filterDay));

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🏪</div>이 요일에 배정된 점포가 없어요<br><small>위의 "+ 점포" 버튼으로 추가하세요</small></div>`;
    return;
  }

  // 방문 순서 정렬
  const sorted = [...filtered].sort((a,b) => {
    if (a.order && b.order) return a.order - b.order;
    if (a.order) return -1;
    if (b.order) return 1;
    return 0;
  });

  list.innerHTML = '';
  sorted.forEach(store => {
    const comp = isComplete(store);
    const prog = getProgress(store);
    const isSel = store.id === selectedStoreId;
    const isLeave = store.days.some(d => hasLeaveOnDay(d));

    const card = document.createElement('div');
    card.className = `store-card${isSel?' selected':''}${comp?' completed':''}${isLeave?' leave-day':''}`;

    const dayTags = store.days.map(d =>
      `<span class="store-day-tag">${DAY_NAMES[d]}</span>`
    ).join('');

    const taskRows = (store.tasks||[]).map(task => `
      <div class="checklist-item">
        <button class="check-btn${task.done?' done':''}" type="button"
          data-action="toggle" data-sid="${store.id}" data-tid="${task.id}">
          ${task.done ? '✓' : ''}
        </button>
        <div class="check-text${task.done?' done':''}">${task.text}</div>
        <button class="del-btn" type="button" data-action="del-task" data-sid="${store.id}" data-tid="${task.id}">✕</button>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="store-card-header" data-action="select" data-sid="${store.id}">
        ${store.order ? `<div class="store-order-badge">${store.order}</div>` : ''}
        <div style="flex:1">
          <div class="store-name">${store.name}</div>
          <div class="store-day-tags" style="margin-top:3px">${dayTags || '<span style="font-size:0.62rem;color:var(--text3)">요일 미배정</span>'}</div>
        </div>
        ${comp ? '<div class="store-complete-icon">✅</div>' : ''}
        <button class="btn btn-sm btn-green-outline" data-action="edit" data-sid="${store.id}" style="margin-left:4px;flex-shrink:0">편집</button>
      </div>
      ${store.tasks && store.tasks.length > 0 ? `<div class="store-progress"><div class="store-progress-fill" style="width:${prog}%"></div></div>` : ''}
      <div class="store-checklist">
        ${taskRows || `<div class="no-task">체크리스트가 없어요</div>`}
        <div class="add-task-row">
          <input class="task-input" id="ti-${store.id}" placeholder="할 일 추가..." autocomplete="off" type="text"/>
          <button class="task-add-btn" data-action="add-task" data-sid="${store.id}" type="button">추가</button>
        </div>
      </div>
    `;
    list.appendChild(card);
  });

  // 이벤트
  list.querySelectorAll('[data-action]').forEach(el => {
    const action = el.dataset.action;
    const sid = parseInt(el.dataset.sid);
    const tid = el.dataset.tid;

    if (action === 'select') {
      onTap(el, () => { selectedStoreId = sid; renderAll(); });
    } else if (action === 'edit') {
      onTap(el, (e) => { e.stopPropagation(); openStoreModal(sid); });
    } else if (action === 'toggle') {
      onTap(el, (e) => { e.stopPropagation(); toggleTask(sid, tid); });
    } else if (action === 'del-task') {
      onTap(el, (e) => { e.stopPropagation(); deleteTask(sid, tid); });
    } else if (action === 'add-task') {
      onTap(el, (e) => { e.stopPropagation(); addTask(sid); });
    }
  });

  // Enter 키
  list.querySelectorAll('.task-input').forEach(input => {
    const sid = parseInt(input.id.replace('ti-',''));
    input.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();addTask(sid);} });
  });
}

// ─ 지도 ─
function initCanvas() {
  const wrap = document.getElementById('map-canvas-wrap');
  const canvas = document.getElementById('map-canvas');
  const size = Math.min(wrap.clientWidth - 32, wrap.clientHeight - 32, 600);
  canvasSize = Math.max(size, 240);
  canvas.width = canvasSize;
  canvas.height = canvasSize;
  canvas.style.width = canvasSize + 'px';
  canvas.style.height = canvasSize + 'px';
  drawMapCanvas();
}

function drawMapCanvas() {
  const canvas = document.getElementById('map-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const s = canvasSize;

  // 배경
  ctx.fillStyle = '#F8FBF9';
  ctx.fillRect(0, 0, s, s);

  // 격자
  ctx.strokeStyle = '#E0EDE6';
  ctx.lineWidth = 1;
  const step = s / 8;
  for (let i = 0; i <= 8; i++) {
    ctx.beginPath(); ctx.moveTo(i*step, 0); ctx.lineTo(i*step, s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i*step); ctx.lineTo(s, i*step); ctx.stroke();
  }

  // 힌트 텍스트 (점포 없을 때)
  const hasPos = stores.some(s => s.px !== null && s.py !== null);
  if (!hasPos) {
    ctx.fillStyle = '#B0CCC0';
    ctx.font = '14px Noto Sans KR, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('위치 지정 모드에서 점포를 배치하세요', s/2, s/2);
  }
}

function renderMap() {
  drawMapCanvas();
  const pinsDiv = document.getElementById('map-pins');
  const routeSvg = document.getElementById('map-route-svg');
  const wrap = document.getElementById('map-canvas-wrap');
  if (!pinsDiv || !routeSvg || !wrap) return;

  const wrapRect = wrap.getBoundingClientRect();
  const canvasEl = document.getElementById('map-canvas');
  const canvasRect = canvasEl.getBoundingClientRect();
  const offsetX = canvasRect.left - wrapRect.left;
  const offsetY = canvasRect.top - wrapRect.top;

  pinsDiv.innerHTML = '';

  // 방문 순서 있는 점포만 route
  const ordered = stores.filter(s => s.order && s.px !== null).sort((a,b) => a.order - b.order);
  let routePath = '';
  ordered.forEach((store, i) => {
    const x = offsetX + store.px;
    const y = offsetY + store.py;
    routePath += i === 0 ? `M ${x} ${y}` : ` L ${x} ${y}`;
  });
  routeSvg.style.width = wrapRect.width + 'px';
  routeSvg.style.height = wrapRect.height + 'px';
  routeSvg.innerHTML = routePath ? `
    <path d="${routePath}" stroke="#F57C00" stroke-width="2" stroke-dasharray="5 4" fill="none" opacity="0.7"/>
  ` : '';

  // 핀
  stores.forEach(store => {
    if (store.px === null || store.py === null) return;
    const comp = isComplete(store);
    const isSel = store.id === selectedStoreId;
    const shortName = store.name.replace('CU','').replace('점','').substring(0,4);

    const pin = document.createElement('div');
    pin.className = 'map-pin';
    pin.style.left = (offsetX + store.px) + 'px';
    pin.style.top = (offsetY + store.py) + 'px';
    pin.style.position = 'absolute';

    pin.innerHTML = `
      <div class="map-pin-inner${comp?' completed':''}${isSel?' selected':''}" data-sid="${store.id}">
        ${shortName}
        ${store.order ? `<div class="map-pin-order">${store.order}</div>` : ''}
      </div>
    `;
    pinsDiv.appendChild(pin);

    onTap(pin.querySelector('.map-pin-inner'), (e) => {
      e.stopPropagation();
      selectedStoreId = store.id;
      renderAll();
    });
  });
}

function setupMapEvents() {
  const canvas = document.getElementById('map-canvas');

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return {
      x: Math.round(touch.clientX - rect.left),
      y: Math.round(touch.clientY - rect.top)
    };
  }

  function handlePlace(e) {
    if (!mapPlacingMode) return;
    if (!selectedStoreId) {
      showConfirm('점포 선택 필요', '먼저 점포 목록에서 점포를 선택해주세요', ()=>{}, '확인', 'modal-btn-green');
      return;
    }
    const pos = getPos(e);
    const store = stores.find(s => s.id === selectedStoreId);
    if (store) {
      store.px = pos.x;
      store.py = pos.y;
      save();
      renderMap();
    }
  }

  let touchMoved = false;
  canvas.addEventListener('touchstart', () => { touchMoved = false; }, {passive:true});
  canvas.addEventListener('touchmove', () => { touchMoved = true; }, {passive:true});
  canvas.addEventListener('touchend', e => {
    if (!touchMoved && mapPlacingMode) { e.preventDefault(); handlePlace(e); }
  });
  canvas.addEventListener('click', handlePlace);

  // 드래그로 이동 (PC)
  let draggingId = null;
  document.getElementById('map-pins').addEventListener('mousedown', e => {
    const inner = e.target.closest('.map-pin-inner');
    if (!inner) return;
    draggingId = parseInt(inner.dataset.sid);
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!draggingId) return;
    const rect = canvas.getBoundingClientRect();
    const x = Math.round(e.clientX - rect.left);
    const y = Math.round(e.clientY - rect.top);
    if (x < 0 || y < 0 || x > canvasSize || y > canvasSize) return;
    const store = stores.find(s => s.id === draggingId);
    if (store) { store.px = x; store.py = y; renderMap(); }
  });
  document.addEventListener('mouseup', () => {
    if (draggingId) { save(); draggingId = null; }
  });

  // 터치 드래그
  document.getElementById('map-pins').addEventListener('touchstart', e => {
    const inner = e.target.closest('.map-pin-inner');
    if (!inner) return;
    draggingId = parseInt(inner.dataset.sid);
    touchMoved = false;
  }, {passive:true});
  document.addEventListener('touchmove', e => {
    if (!draggingId) return;
    touchMoved = true;
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    const x = Math.round(t.clientX - rect.left);
    const y = Math.round(t.clientY - rect.top);
    if (x < 0 || y < 0 || x > canvasSize || y > canvasSize) return;
    const store = stores.find(s => s.id === draggingId);
    if (store) { store.px = x; store.py = y; renderMap(); }
  }, {passive:true});
  document.addEventListener('touchend', () => {
    if (draggingId) { save(); draggingId = null; }
  });
}

// ─ 연차 ─
function renderLeave() {
  const grid = document.getElementById('leave-week-grid');
  const listEl = document.getElementById('leave-list');
  if (!grid || !listEl) return;

  grid.innerHTML = [1,2,3,4,5,6,7].map(d => {
    const leave = leaves[d];
    return `
      <button class="week-day-cell${leave?' has-leave':''}" data-day="${d}" type="button">
        <span>${DAY_NAMES[d]}</span>
        ${leave ? `<span class="leave-badge">${leave}</span>` : ''}
      </button>
    `;
  }).join('');

  grid.querySelectorAll('.week-day-cell').forEach(btn => {
    onTap(btn, () => openLeaveModal(parseInt(btn.dataset.day)));
  });

  const hasAny = Object.keys(leaves).length > 0;
  if (!hasAny) {
    listEl.innerHTML = '<div style="font-size:0.78rem;color:var(--text3)">등록된 연차가 없어요</div>';
  } else {
    listEl.innerHTML = Object.entries(leaves).map(([day, type]) => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F0F0F0">
        <span style="font-size:0.8rem;font-weight:700;color:var(--text)">${DAY_NAMES[day]}요일</span>
        <span style="font-size:0.75rem;background:var(--red-pale);color:var(--red);padding:2px 10px;border-radius:10px;font-weight:700">${type}</span>
      </div>
    `).join('');
  }
}

function openLeaveModal(day) {
  const overlay = document.getElementById('modal-leave');
  document.getElementById('modal-leave-title').textContent = `${DAY_NAMES[day]}요일 연차 등록`;
  let selectedType = leaves[day] || null;

  const typeBtns = document.querySelectorAll('.leave-type-btn');
  typeBtns.forEach(btn => {
    btn.classList.remove('selected');
    if (btn.dataset.leave === selectedType) btn.classList.add('selected');
    if (btn.dataset.leave === 'custom' && selectedType && !['연차','반차','반반차'].includes(selectedType)) {
      btn.classList.add('selected');
    }
  });

  const customWrap = document.getElementById('modal-leave-custom-wrap');
  const customInput = document.getElementById('modal-leave-custom');
  customWrap.style.display = selectedType && !['연차','반차','반반차'].includes(selectedType) ? 'block' : 'none';
  customInput.value = selectedType && !['연차','반차','반반차'].includes(selectedType) ? selectedType : '';

  typeBtns.forEach(btn => {
    const newBtn = btn.cloneNode(true);
    btn.parentNode.replaceChild(newBtn, btn);
    onTap(newBtn, () => {
      document.querySelectorAll('.leave-type-btn').forEach(b => b.classList.remove('selected'));
      newBtn.classList.add('selected');
      selectedType = newBtn.dataset.leave;
      customWrap.style.display = selectedType === 'custom' ? 'block' : 'none';
    });
  });

  overlay.classList.add('show');

  const cancel = document.getElementById('modal-leave-cancel');
  const ok = document.getElementById('modal-leave-ok');
  const remove = document.getElementById('modal-leave-remove');

  function cleanup() { overlay.classList.remove('show'); }

  const newCancel = cancel.cloneNode(true);
  cancel.parentNode.replaceChild(newCancel, cancel);
  onTap(newCancel, cleanup);

  const newOk = ok.cloneNode(true);
  ok.parentNode.replaceChild(newOk, ok);
  onTap(newOk, () => {
    let type = selectedType;
    if (type === 'custom') type = customInput.value.trim() || '기타';
    if (!type) return;
    leaves[day] = type;
    save(); cleanup(); renderAll();
  });

  const newRemove = remove.cloneNode(true);
  remove.parentNode.replaceChild(newRemove, remove);
  onTap(newRemove, () => {
    delete leaves[day];
    save(); cleanup(); renderAll();
  });
}

// ─ 요약 ─
function renderSummary() {
  const content = document.getElementById('summary-content');
  if (!content) return;

  let html = '';
  for (let d = 1; d <= 7; d++) {
    const dayStores = stores.filter(s => s.days.includes(d))
      .sort((a,b) => (a.order||999) - (b.order||999));
    const leave = leaves[d];

    html += `
      <div class="summary-day-block">
        <div class="summary-day-header">
          <div class="summary-day-name">${DAY_NAMES[d]}요일</div>
          ${leave ? `<div class="summary-leave-badge">${leave}</div>` : ''}
        </div>
    `;

    if (dayStores.length === 0) {
      html += `<div class="summary-empty">배정된 점포가 없어요</div>`;
    } else {
      dayStores.forEach(store => {
        const prog = getProgress(store);
        const taskRows = (store.tasks||[]).map(t =>
          `<div class="summary-task${t.done?' done':''}">
            ${t.done ? '✅' : '⬜'} ${t.text}
          </div>`
        ).join('');
        html += `
          <div class="summary-store-row">
            <div class="summary-store-name">
              ${store.order ? `<span style="background:var(--orange);color:#fff;font-size:0.6rem;padding:1px 6px;border-radius:8px">${store.order}번째</span>` : ''}
              ${store.name}
              <span style="font-size:0.65rem;color:var(--text3);font-weight:400">${prog}%</span>
            </div>
            ${taskRows || '<div class="summary-task">체크리스트 없음</div>'}
          </div>
        `;
      });
    }
    html += '</div>';
  }
  content.innerHTML = html;
}

// ─ 디테일 패널 (데스크탑) ─
function renderDetailPanel() {
  const body = document.getElementById('detail-body');
  const title = document.getElementById('detail-title');
  if (!body || !title) return;

  if (!selectedStoreId) {
    title.textContent = '⚙️ 점포 상세';
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>점포를 선택하면<br>상세 정보가 표시돼요</div>`;
    return;
  }
  const store = stores.find(s => s.id === selectedStoreId);
  if (!store) return;

  title.textContent = store.name;
  const dayBadges = store.days.map(d => `<span class="store-day-tag">${DAY_NAMES[d]}</span>`).join('') || '없음';

  body.innerHTML = `
    <div class="sec-label">방문 요일</div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">${dayBadges}</div>
    ${store.order ? `<div style="font-size:0.78rem;margin-bottom:10px;color:var(--text2)">방문 순서: <strong>${store.order}번째</strong></div>` : ''}
    ${store.px !== null ? `<div style="font-size:0.72rem;color:var(--text3);margin-bottom:8px">📍 지도에 위치 등록됨</div>` : '<div style="font-size:0.72rem;color:var(--orange);margin-bottom:8px">📍 지도에 위치 미등록</div>'}
    <button class="btn btn-sm btn-green-outline" style="width:100%;margin-bottom:10px" id="detail-edit-btn" type="button">정보 편집</button>
    <div class="divider"></div>
    <div class="sec-label">체크리스트 (${getProgress(store)}% 완료)</div>
    ${(store.tasks||[]).map(t => `
      <div class="checklist-item">
        <button class="check-btn${t.done?' done':''}" type="button"
          data-action="toggle" data-sid="${store.id}" data-tid="${t.id}">
          ${t.done?'✓':''}
        </button>
        <div class="check-text${t.done?' done':''}">${t.text}</div>
        <button class="del-btn" type="button" data-action="del-task" data-sid="${store.id}" data-tid="${t.id}">✕</button>
      </div>
    `).join('')}
    <div class="add-task-row">
      <input class="task-input" id="detail-task-input" placeholder="할 일 추가..." autocomplete="off"/>
      <button class="task-add-btn" data-action="add-task" data-sid="${store.id}" type="button">추가</button>
    </div>
    <div class="divider"></div>
    <button class="btn btn-sm btn-red-outline" style="width:100%" id="detail-delete-btn" type="button">점포 삭제</button>
  `;

  onTap(document.getElementById('detail-edit-btn'), () => openStoreModal(store.id));
  onTap(document.getElementById('detail-delete-btn'), () => {
    showConfirm('점포 삭제', `"${store.name}"을 삭제하시겠어요?`, () => {
      stores = stores.filter(s => s.id !== store.id);
      selectedStoreId = null;
      save(); renderAll();
    });
  });

  body.querySelectorAll('[data-action]').forEach(el => {
    const action = el.dataset.action;
    const sid = parseInt(el.dataset.sid);
    const tid = el.dataset.tid;
    if (action === 'toggle') { onTap(el, (e)=>{ e.stopPropagation(); toggleTask(sid,tid); }); }
    else if (action === 'del-task') { onTap(el, (e)=>{ e.stopPropagation(); deleteTask(sid,tid); }); }
    else if (action === 'add-task') { onTap(el, (e)=>{ e.stopPropagation(); addTask(sid, 'detail-task-input'); }); }
  });

  const taskInput = document.getElementById('detail-task-input');
  if (taskInput) {
    taskInput.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();addTask(store.id,'detail-task-input');} });
  }
}

// ══════════════════════════════
// 액션
// ══════════════════════════════
function toggleTask(storeId, taskId) {
  const store = stores.find(s=>s.id===storeId);
  if (!store) return;
  const task = store.tasks.find(t=>t.id===taskId);
  if (task) task.done = !task.done;
  save(); renderAll();
}
function deleteTask(storeId, taskId) {
  const store = stores.find(s=>s.id===storeId);
  if (!store) return;
  store.tasks = store.tasks.filter(t=>t.id!==taskId);
  save(); renderAll();
}
function addTask(storeId, inputId) {
  const id = inputId || `ti-${storeId}`;
  const input = document.getElementById(id);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  const store = stores.find(s=>s.id===storeId);
  if (!store) return;
  if (!store.tasks) store.tasks = [];
  store.tasks.push({ id: Date.now().toString(), text, done:false });
  input.value = '';
  save(); renderAll();
  setTimeout(() => {
    const newInput = document.getElementById(id);
    if (newInput) newInput.focus();
  }, 50);
}

// 점포 추가/편집 모달
let editingStoreId = null;
let modalDays = [];

function openStoreModal(storeId) {
  editingStoreId = storeId || null;
  modalDays = [];

  const overlay = document.getElementById('modal-store');
  const title = document.getElementById('modal-store-title');
  const nameInput = document.getElementById('modal-store-name');
  const orderInput = document.getElementById('modal-store-order');

  if (storeId) {
    const store = stores.find(s=>s.id===storeId);
    title.textContent = '점포 편집';
    nameInput.value = store.name;
    orderInput.value = store.order || '';
    modalDays = [...(store.days||[])];
  } else {
    title.textContent = '점포 추가';
    nameInput.value = '';
    orderInput.value = '';
    modalDays = [];
  }

  document.querySelectorAll('#modal-store-days .day-btn').forEach(btn => {
    const d = parseInt(btn.dataset.day);
    btn.classList.toggle('active', modalDays.includes(d));
    const newBtn = btn.cloneNode(true);
    btn.parentNode.replaceChild(newBtn, btn);
    onTap(newBtn, () => {
      const day = parseInt(newBtn.dataset.day);
      const idx = modalDays.indexOf(day);
      if (idx>=0) modalDays.splice(idx,1); else modalDays.push(day);
      modalDays.sort();
      document.querySelectorAll('#modal-store-days .day-btn').forEach(b => {
        b.classList.toggle('active', modalDays.includes(parseInt(b.dataset.day)));
      });
    });
  });

  overlay.classList.add('show');
  setTimeout(() => nameInput.focus(), 100);

  const cancelBtn = document.getElementById('modal-store-cancel');
  const okBtn = document.getElementById('modal-store-ok');

  const newCancel = cancelBtn.cloneNode(true);
  cancelBtn.parentNode.replaceChild(newCancel, cancelBtn);
  onTap(newCancel, () => overlay.classList.remove('show'));

  const newOk = okBtn.cloneNode(true);
  okBtn.parentNode.replaceChild(newOk, okBtn);
  onTap(newOk, () => {
    const name = nameInput.value.trim();
    if (!name) return;
    const order = parseInt(orderInput.value) || null;

    if (editingStoreId) {
      const store = stores.find(s=>s.id===editingStoreId);
      if (store) { store.name=name; store.days=modalDays; store.order=order; }
    } else {
      stores.push({ id:nextId++, name, days:modalDays, tasks:[], order, px:null, py:null });
    }
    save();
    overlay.classList.remove('show');
    renderAll();
  });
}

// ══════════════════════════════
// 탭 / 필터 이벤트
// ══════════════════════════════
function initEvents() {
  // 모바일 탭
  document.querySelectorAll('.nav-tab').forEach(tab => {
    onTap(tab, () => {
      document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      const tabName = tab.dataset.tab;
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      document.getElementById(`panel-${tabName}`).classList.add('active');
    });
  });

  // 요일 필터
  document.querySelectorAll('#filter-day-row .day-btn').forEach(btn => {
    onTap(btn, () => {
      filterDay = parseInt(btn.dataset.day);
      document.querySelectorAll('#filter-day-row .day-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderStoreList();
    });
  });

  // + 점포 버튼
  onTap(document.getElementById('btn-add-store-top'), () => openStoreModal(null));

  // 지도 위치 지정 모드 토글
  onTap(document.getElementById('btn-map-mode'), () => {
    mapPlacingMode = !mapPlacingMode;
    const btn = document.getElementById('btn-map-mode');
    const hint = document.getElementById('map-hint');
    btn.textContent = mapPlacingMode ? '✅ 위치 지정 중...' : '위치 지정 모드';
    btn.className = `btn btn-sm ${mapPlacingMode ? 'btn-primary' : 'btn-green-outline'}`;
    hint.textContent = mapPlacingMode
      ? '📍 지도를 탭하여 선택된 점포 위치 지정 | 핀을 드래그하여 이동'
      : '📍 빈 곳을 탭/클릭하여 선택된 점포 위치 지정';
  });

  // 요약 버튼 (상단, 데스크탑용)
  onTap(document.getElementById('btn-summary-top'), () => {
    renderSummary();
  });

  // 창 크기 변경 시 캔버스 재조정
  window.addEventListener('resize', () => {
    initCanvas();
    renderMap();
  });
}

// ══════════════════════════════
// 초기화
// ══════════════════════════════
load();
initEvents();
initCanvas();
setupMapEvents();
renderAll();
</script>
